[phases.setup]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build",
    "php artisan migrate --force",
    "php artisan db:seed --force",
    "php artisan storage:link",
    "php artisan optimize"
]

[phases.build]
cmds = []

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
